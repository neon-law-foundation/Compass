---
name: Continuous Integration

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SWIFT_VERSION: "6.3.1"

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Swift toolchain
        uses: SwiftyLab/setup-swift@v1.14.0
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Run Swift Format Lint
        run: swift format lint --strict --recursive --parallel --no-color-diagnostics .

      - name: Cache Swift Package Manager dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Run Swift Build (Strict - Fail on Warnings)
        run: swift build -Xswiftc -warnings-as-errors

      - name: Build release binary
        if: runner.os == 'macOS'
        run: swift build -c release --product Compass

      - name: Run compass binary against the repo's own README
        if: runner.os == 'macOS'
        # The repo's own README ends with the literal "Compass · 2026" footer,
        # so `compass lint README.md` must exit 0. Anything other than 0 indicates
        # either C001 has regressed or the binary itself is broken.
        run: .build/release/Compass lint README.md

      - name: Run tests
        run: swift test
